name: Publish Helm chart

on:
  push:
    branches:
      - main
      - master
    paths:
      - chart/neon-postgres-chart/**
      - .github/workflows/publish-helm-chart.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CHART_DIR: chart/neon-postgres-chart
  OCI_REGISTRY: ghcr.io
  OCI_NAMESPACE: federicolepera/krateo-challenge-lepera/charts

jobs:
  publish:
    name: Package and push chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Read chart metadata
        id: chart
        run: |
          chart_name="$(awk '/^name:/ {print $2}' "$CHART_DIR/Chart.yaml")"
          chart_version="$(awk '/^version:/ {print $2}' "$CHART_DIR/Chart.yaml")"
          echo "name=$chart_name" >> "$GITHUB_OUTPUT"
          echo "version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "package=${chart_name}-${chart_version}.tgz" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: |
          helm dependency build "$CHART_DIR"
          helm lint "$CHART_DIR"

      - name: Package chart
        run: |
          mkdir -p dist
          helm dependency build "$CHART_DIR"
          helm package "$CHART_DIR" --destination dist

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$OCI_REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: helm push "dist/${{ steps.chart.outputs.package }}" "oci://${OCI_REGISTRY}/${OCI_NAMESPACE}"

      - name: Print chart reference
        run: |
          echo "Published chart:"
          echo "  oci://${OCI_REGISTRY}/${OCI_NAMESPACE}/${{ steps.chart.outputs.name }}:${{ steps.chart.outputs.version }}"
          echo "Krateo CompositionDefinition values:"
          echo "  chart.url=oci://${OCI_REGISTRY}/${OCI_NAMESPACE}"
          echo "  chart.repo=${{ steps.chart.outputs.name }}"
          echo "  chart.version=${{ steps.chart.outputs.version }}"
